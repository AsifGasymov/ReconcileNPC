<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#16243B"/>
      <stop offset="1" stop-color="#0B1220"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#60A5FA"/>
      <stop offset="1" stop-color="#3B82F6"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="1024" height="1024" rx="220" ry="220" fill="url(#bg)"/>
  <rect x="2" y="2" width="1020" height="1020" rx="219" ry="219"
        fill="none" stroke="#1E2D4A" stroke-width="2"/>
  <g transform="translate(512 512)">
    <!-- N glyph: two vertical strokes + diagonal -->
    <rect x="-200" y="-220" width="80" height="440" rx="14" fill="#E5EBF5"/>
    <rect x="120" y="-220" width="80" height="440" rx="14" fill="#E5EBF5"/>
    <polygon points="-120,-220 -40,-220 200,180 200,220 120,220 -120,-180"
             fill="url(#accent)"/>
    <!-- accent dot -->
    <circle cx="200" cy="-180" r="36" fill="#FCD34D"/>
  </g>
</svg>
